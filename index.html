<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multimodas - Inventario Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.database = {};
        window.userId = null;
        
        // Guardado Híbrido: Local (para Vercel) y Nube (para Canvas)
        window.saveToCloud = async (newItems) => {
            try {
                localStorage.setItem('multimodas_inventory', JSON.stringify(newItems));
            } catch (e) { console.warn("No se pudo usar localStorage", e); }
        };

        try {
            // Cargar de memoria local primero para que sea instantáneo en Vercel
            const localData = localStorage.getItem('multimodas_inventory');
            if (localData) {
                window.database = JSON.parse(localData);
            }

            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'multimodas-scanner';
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        window.userId = user.uid;
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'inventory', 'main');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && Object.keys(window.database).length === 0) {
                            window.database = docSnap.data().items || {};
                            if (typeof updateUI === 'function') updateUI(Object.keys(window.database).length);
                        }
                    } else {
                        initAuth();
                    }
                });

                window.saveToCloud = async (newItems) => {
                    try { localStorage.setItem('multimodas_inventory', JSON.stringify(newItems)); } catch(e){}
                    if (!window.userId) return;
                    const docRef = doc(db, 'artifacts', appId, 'users', window.userId, 'inventory', 'main');
                    await setDoc(docRef, { items: newItems });
                };
            }
        } catch(e) {
            console.error("Error inicializando DB:", e);
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #reader { 
            border: none !important; 
            width: 100% !important; 
            min-height: 380px; 
            background: #000; 
            border-radius: 2.5rem; 
            overflow: hidden;
            position: relative;
        }

        #reader video { 
            border-radius: 2.5rem !important; 
            object-fit: cover !important; 
            width: 100% !important;
            height: 100% !important;
            playsinline: true !important;
            -webkit-playsinline: true !important;
        }

        video::-webkit-media-controls { display:none !important; }
        #reader__dashboard { display: none !important; }

        .tab-active { background: white; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); color: #111827; }
        .btn-primary { background: #111827; color: white; padding: 1.25rem; border-radius: 1.5rem; font-weight: 800; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-primary:active { transform: scale(0.95); }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 4px;
            background: rgba(59, 130, 246, 0.8);
            box-shadow: 0 0 20px rgba(59, 130, 246, 1);
            animation: moveLine 1.2s infinite ease-in-out;
            z-index: 10;
            border-radius: 4px;
            pointer-events: none;
        }
        @keyframes moveLine {
            0%, 100% { transform: translateY(-70px); opacity: 0.5; }
            50% { transform: translateY(70px); opacity: 1; }
        }

        .focus-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 140px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active {
            animation: pulse-red 1.5s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center transition-opacity duration-300">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Preparando App...</p>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-gray-900 tracking-tight">Multi<span class="text-blue-600">modas</span></h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-left">by Mynor Garcia</p>
        </div>
        <div id="db-status" class="text-[10px] uppercase font-bold px-3 py-1.5 rounded-full bg-red-100 text-red-600 border border-red-200">
            Sin Datos
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <div class="flex bg-gray-200 p-1.5 rounded-2xl mb-6 shadow-inner">
            <button onclick="switchTab('scan')" id="tab-scan" class="flex-1 py-2.5 text-sm font-bold tab-active">Escanear</button>
            <button onclick="switchTab('data')" id="tab-data" class="flex-1 py-2.5 text-sm font-bold text-gray-500">Inventario</button>
        </div>

        <section id="section-scan" class="space-y-4">
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </div>
                    <span class="text-xs font-bold text-gray-700">Modo Continuo</span>
                </div>
                <label class="switch cursor-pointer">
                    <div class="relative inline-block w-11 h-6">
                        <input type="checkbox" id="camera-continuous" class="peer opacity-0 w-0 h-0" onchange="handleCameraModeChange()">
                        <span class="absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-gray-300 transition-all rounded-full before:absolute before:h-4 before:w-4 before:left-1 before:bottom-1 before:bg-white before:transition-all before:rounded-full peer-checked:bg-blue-600 peer-checked:before:translate-x-5"></span>
                    </div>
                </label>
            </div>

            <div class="bg-white p-4 rounded-[3rem] shadow-sm border border-gray-100 relative overflow-hidden">
                <div id="camera-ui-container">
                    <div id="reader" class="w-full">
                        <div class="focus-box"></div>
                        <div class="scan-line" id="scan-line"></div>
                    </div>
                    <button id="torch-button" onclick="toggleTorch()" class="hidden absolute top-8 right-8 z-20 bg-white/10 backdrop-blur-xl p-4 rounded-full text-white active:scale-90 transition-transform border border-white/20">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                </div>

                <div id="manual-trigger-container" class="hidden flex flex-col items-center py-16 gap-6 text-center">
                    <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center text-blue-500">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 7h1v10H5V7zm3 0h2v10H8V7zm5 0h1v10h-1V7zm3 0h2v10h-2V7zm3 0h1v10h-1V7z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5v2m0 10v2m18-12v2m0 10v2" /></svg>
                    </div>
                    <button onclick="startScanner(true)" class="btn-primary w-full max-w-[280px] flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        Iniciar Escaneo
                    </button>
                </div>

                <div id="result-container" class="hidden animate-in zoom-in duration-300">
                    <div class="p-10 rounded-[2.5rem] bg-gray-900 text-white shadow-2xl relative overflow-hidden text-center">
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-600/30 rounded-full blur-3xl"></div>
                        <div class="relative z-10">
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400 mb-4">Precio del Producto</p>
                            <h2 id="res-price" class="text-7xl font-black tracking-tighter mb-4 tabular-nums">Q0</h2>
                            <p id="res-code" class="text-xs font-mono opacity-40 mb-8 bg-white/5 inline-block px-4 py-1.5 rounded-full tracking-widest">ID: ---</p>
                            <button id="btn-new-scan" onclick="resetManualScan()" class="hidden w-full bg-blue-600 py-5 rounded-2xl font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-xl">
                                Escanear Siguiente
                            </button>
                        </div>
                    </div>
                </div>

                <div id="not-found" class="mt-4 hidden p-8 rounded-2xl bg-orange-50 border border-orange-100 text-orange-800 text-center text-sm font-bold">
                    ⚠️ Código no encontrado.
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex gap-2">
                    <input type="text" id="manual-code" placeholder="Código manual..." class="flex-1 px-5 py-4 bg-gray-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-base font-bold uppercase tracking-widest">
                    <button id="voice-btn" onclick="toggleVoiceDictation()" class="bg-gray-100 text-gray-500 p-4 rounded-2xl transition-all active:scale-95 shadow-sm border border-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 10v2a7 7 0 01-14 0v-2m14 0a2 2 0 002-2V8a2 2 0 00-2-2m-14 0a2 2 0 00-2 2v2a2 2 0 002 2"></path>
                        </svg>
                    </button>
                    <button onclick="searchManual()" class="bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold active:scale-95 transition-transform uppercase text-xs">OK</button>
                </div>
                <p id="voice-status" class="text-[9px] text-gray-400 mt-2 text-center uppercase font-bold tracking-widest hidden">Escuchando...</p>
            </div>
        </section>

        <section id="section-data" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 text-center">
                <h3 class="text-xl font-black text-gray-900 mb-4 text-center">Cargar Datos</h3>
                <input type="file" id="excel-file" class="hidden" accept=".xlsx, .xls, .csv" onchange="handleExcel(this)" />
                <button onclick="document.getElementById('excel-file').click()" class="flex flex-col items-center justify-center w-full h-52 border-2 border-dashed border-gray-200 rounded-[2.5rem] bg-gray-50 hover:bg-blue-50 transition-all">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-4 text-green-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2a4 4 0 014-4h4m-4 4l-4-4m4 4l4-4m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    </div>
                    <p class="text-sm font-black text-gray-700">Subir Archivo de Excel</p>
                </button>
                <button onclick="clearData()" class="mt-8 text-[10px] font-black text-red-400 uppercase tracking-widest">Eliminar Inventario Actual</button>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm overflow-hidden">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 text-center">Vista Previa</h3>
                <div id="data-preview" class="text-xs text-gray-600 space-y-3">Sin productos.</div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-4 bg-gray-900 text-white rounded-2xl text-[10px] font-black uppercase opacity-0 pointer-events-none transition-all duration-300 shadow-2xl z-[100] tracking-widest">
        MENSAJE
    </div>

    <script>
        let html5QrCode;
        let recognition;
        let voiceTimeout;
        let videoTrack = null;
        let isTorchOn = false;

        const initSpeech = () => {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                document.getElementById('voice-btn').style.display = 'none';
                return;
            }
            recognition = new window.SpeechRecognition();
            recognition.interimResults = true;
            recognition.lang = 'es-GT';

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results).map(result => result[0].transcript).join('');
                document.getElementById('manual-code').value = transcript.toUpperCase();
                clearTimeout(voiceTimeout);
                voiceTimeout = setTimeout(() => {
                    recognition.stop();
                    searchManual();
                }, 1000);
            };

            recognition.onstart = () => {
                document.getElementById('voice-btn').classList.add('mic-active');
                document.getElementById('voice-status').classList.remove('hidden');
            };

            recognition.onend = () => {
                document.getElementById('voice-btn').classList.remove('mic-active');
                document.getElementById('voice-status').classList.add('hidden');
            };
        };

        function toggleVoiceDictation() {
            if (!recognition) return;
            try { recognition.start(); } catch(e) { recognition.stop(); }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg;
            toast.style.opacity = "1";
            toast.style.transform = "translate(-50%, -15px)";
            setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translate(-50%, 0px)"; }, 3000);
        }

        function switchTab(tab) {
            const isScan = tab === 'scan';
            document.getElementById('section-scan').classList.toggle('hidden', !isScan);
            document.getElementById('section-data').classList.toggle('hidden', isScan);
            document.getElementById('tab-scan').classList.toggle('tab-active', isScan);
            document.getElementById('tab-scan').classList.toggle('text-gray-500', !isScan);
            document.getElementById('tab-data').classList.toggle('tab-active', !isScan);
            document.getElementById('tab-data').classList.toggle('text-gray-500', isScan);
            if (isScan) handleCameraModeChange();
            else stopScanner();
        }

        async function handleExcel(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    const newDb = {};
                    json.forEach(row => {
                        const keys = Object.keys(row);
                        const cK = keys.find(k => /cod|id|bar/i.test(k)) || keys[0];
                        const pK = keys.find(k => /pre|val|cost|monto/i.test(k)) || keys[1];
                        const code = String(row[cK]).trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                        const rP = row[pK];
                        if (code && rP !== undefined) {
                            let v = parseFloat(String(rP).replace(/[^\d.,]/g, '').replace(',', '.'));
                            newDb[code] = isNaN(v) ? "0" : Math.round(v).toString();
                        }
                    });
                    window.database = newDb;
                    updateUI(Object.keys(newDb).length);
                    if (window.saveToCloud) await window.saveToCloud(newDb);
                    showToast(`${Object.keys(newDb).length} PRODUCTOS GUARDADOS`);
                    switchTab('scan');
                } catch (err) { showToast("ERROR AL LEER"); }
                finally { input.value = ""; }
            };
            reader.readAsArrayBuffer(file);
        }

        const patchVideoForIOS = () => {
            const readerDiv = document.getElementById('reader');
            const observer = new MutationObserver((mutations) => {
                mutations.forEach(mu => {
                    mu.addedNodes.forEach(node => {
                        if (node.tagName === 'VIDEO') {
                            node.setAttribute('playsinline', 'true');
                            node.setAttribute('webkit-playsinline', 'true');
                            node.setAttribute('muted', 'true');
                            node.muted = true;
                            
                            const stream = node.srcObject;
                            if(stream) {
                                videoTrack = stream.getVideoTracks()[0];
                                const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                                
                                if(caps.torch) document.getElementById('torch-button')?.classList.remove('hidden');
                                
                                // Aplicar zoom por hardware de manera segura
                                if(caps.zoom) {
                                    const hwZoom = Math.max(caps.zoom.min, Math.min(caps.zoom.max, 2.0));
                                    setTimeout(() => videoTrack.applyConstraints({ advanced: [{ zoom: hwZoom }] }).catch(() => {}), 500);
                                }
                            }
                        }
                    });
                });
            });
            observer.observe(readerDiv, { childList: true, subtree: true });
        };

        async function toggleTorch() {
            if (!videoTrack) return;
            try {
                isTorchOn = !isTorchOn;
                await videoTrack.applyConstraints({ advanced: [{ torch: isTorchOn }] });
            } catch (err) {}
        }

        function handleCameraModeChange() {
            const isCont = document.getElementById('camera-continuous')?.checked;
            document.getElementById('result-container')?.classList.add('hidden');
            document.getElementById('not-found')?.classList.add('hidden');
            
            if (isCont) {
                document.getElementById('manual-trigger-container')?.classList.add('hidden');
                document.getElementById('camera-ui-container')?.classList.remove('hidden');
                
                if (html5QrCode && html5QrCode.getState() === 3) {
                    html5QrCode.resume();
                } else {
                    startScanner(false);
                }
            } else {
                stopScanner();
                document.getElementById('camera-ui-container')?.classList.add('hidden');
                document.getElementById('manual-trigger-container')?.classList.remove('hidden');
            }
        }

        async function stopScanner() {
            isTorchOn = false;
            document.getElementById('torch-button')?.classList.add('hidden');
            if (html5QrCode && (html5QrCode.getState() === 2 || html5QrCode.getState() === 3)) {
                await html5QrCode.stop().catch(() => {});
                html5QrCode = null;
                videoTrack = null;
            }
        }

        async function startScanner(isManualCall = false) {
            const isCont = document.getElementById('camera-continuous')?.checked;
            if (!isCont && !isManualCall) return;
            
            document.getElementById('manual-trigger-container')?.classList.add('hidden');
            document.getElementById('camera-ui-container')?.classList.remove('hidden');
            document.getElementById('result-container')?.classList.add('hidden');
            document.getElementById('not-found')?.classList.add('hidden');
            
            if (html5QrCode && html5QrCode.getState() === 2) return;
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 30, 
                qrbox: (vw, vh) => ({ width: vw * 0.85, height: 200 }), // Caja de lectura ampliada
                aspectRatio: 1.0, 
                videoConstraints: { facingMode: "environment" } 
            };
            
            html5QrCode.start({ facingMode: "environment" }, config, (txt) => {
                if (html5QrCode.getState() !== 2) return; // Evita lecturas fantasmas si está pausado
                findProduct(txt);
                
                if (!document.getElementById('camera-continuous')?.checked) {
                    // PAUSA la cámara en lugar de apagarla para conservar estado y zoom
                    html5QrCode.pause(); 
                    document.getElementById('camera-ui-container')?.classList.add('hidden');
                    document.getElementById('btn-new-scan')?.classList.remove('hidden');
                }
            }).catch(() => {});
        }

        function findProduct(code) {
            const clean = String(code).trim().toUpperCase().replace(/\s/g, '').replace(/[.]/g, '');
            if (window.database[clean]) {
                document.getElementById('res-code').innerText = `ID: ${clean}`;
                document.getElementById('res-price').innerText = `Q${window.database[clean]}`;
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('not-found').classList.add('hidden');
            } else {
                document.getElementById('result-container').classList.add('hidden');
                document.getElementById('not-found').classList.remove('hidden');
                if (!document.getElementById('camera-continuous')?.checked) {
                    document.getElementById('btn-new-scan')?.classList.remove('hidden');
                    if(html5QrCode && html5QrCode.getState() === 2) html5QrCode.pause();
                    document.getElementById('camera-ui-container')?.classList.add('hidden');
                }
            }
        }

        function resetManualScan() {
            document.getElementById('btn-new-scan').classList.add('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('not-found').classList.add('hidden');
            document.getElementById('camera-ui-container').classList.remove('hidden');
            
            if (html5QrCode && html5QrCode.getState() === 3) {
                html5QrCode.resume();
            } else {
                startScanner(true);
            }
        }

        function searchManual() {
            const inp = document.getElementById('manual-code');
            if (inp && inp.value.trim()) findProduct(inp.value.trim());
        }

        function updateUI(count) {
            const st = document.getElementById('db-status');
            const pr = document.getElementById('data-preview');
            if (count > 0) {
                st.innerText = `${count} PRODUCTOS`;
                st.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-green-50 text-green-600 border border-green-100 tracking-wider";
                let h = "";
                Object.keys(window.database).slice(0, 15).forEach(k => { h += `<div class="flex justify-between py-2 border-b border-gray-50 italic"><span>${k}</span><b>Q${window.database[k]}</b></div>`; });
                pr.innerHTML = h;
            } else {
                st.innerText = "Sin Datos";
                st.className = "text-[10px] font-bold px-3 py-1.5 rounded-full bg-red-100 text-red-600 border border-red-200 tracking-wider";
                pr.innerHTML = "Base vacía.";
            }
        }

        async function clearData() {
            window.database = {};
            updateUI(0);
            if (window.saveToCloud) await window.saveToCloud({});
            showToast("DATOS ELIMINADOS");
        }

        // Forzar ocultar la pantalla de carga al terminar el DOM
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none'; // Asegurar completamente que desaparezca
            
            updateUI(Object.keys(window.database).length);
            patchVideoForIOS();
            handleCameraModeChange(); 
            initSpeech();
        });
    </script>
</body>
</html>
